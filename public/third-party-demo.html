<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open API Demo - Campus Trade</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: #f3f4f6; color: #111827; }
        header { background: #4f46e5; color: white; padding: 18px 28px; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        header h1 { margin: 0; font-size: 22px; }
        button { cursor: pointer; border: 0; border-radius: 6px; padding: 10px 14px; font-weight: 700; }
        .home-button { background: rgba(255,255,255,.18); color: white; }
        main { max-width: 1180px; margin: 0 auto; padding: 24px; }
        .panel { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(15,23,42,.06); }
        .filters { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; }
        input, select { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 10px 12px; font-size: 14px; }
        .primary { background: #4f46e5; color: white; }
        .secondary { background: #e5e7eb; color: #374151; }
        .url-box { font-family: Consolas, monospace; background: #111827; color: #d1fae5; padding: 12px; border-radius: 8px; overflow-x: auto; }
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .cards { display: grid; gap: 12px; }
        .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; background: #fff; }
        .card h3 { margin: 0 0 8px; color: #4338ca; }
        .meta { display: flex; gap: 8px; flex-wrap: wrap; color: #6b7280; font-size: 13px; margin: 10px 0; }
        .price { color: #dc2626; font-size: 22px; font-weight: 900; }
        pre { margin: 0; white-space: pre-wrap; word-break: break-word; background: #111827; color: #e5e7eb; padding: 14px; border-radius: 8px; max-height: 520px; overflow: auto; }
        .error { color: #b91c1c; font-weight: 700; margin-top: 12px; }
        @media (max-width: 860px) { .filters, .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Campus Second-hand Platform Open API Demo</h1>
        <div>
            <button class="home-button" onclick="location.href='index.html'">Back Home</button>
            <button class="home-button" onclick="location.href='skill-demo.html'">Skill Demo</button>
        </div>
    </header>

    <main>
        <section class="panel">
            <div class="filters">
                <input id="keyword" placeholder="Keyword">
                <select id="category">
                    <option value="">All categories</option>
                    <option value="教材资料">教材资料</option>
                    <option value="宿舍用品">宿舍用品</option>
                    <option value="电子数码">电子数码</option>
                    <option value="交通出行">交通出行</option>
                    <option value="考试资料">考试资料</option>
                </select>
                <input id="minPrice" type="number" min="0" placeholder="Min price">
                <input id="maxPrice" type="number" min="0" placeholder="Max price">
                <div style="display:flex; gap:10px;">
                    <button class="primary" onclick="queryProducts()">Search</button>
                    <button class="secondary" onclick="resetFilters()">Reset</button>
                </div>
            </div>
            <div id="error" class="error"></div>
        </section>

        <section class="panel">
            <h2>Request API URL</h2>
            <div id="requestUrl" class="url-box">No request yet</div>
        </section>

        <section class="content-grid">
            <div class="panel">
                <h2>Product Cards</h2>
                <div id="cards" class="cards"></div>
            </div>
            <div class="panel">
                <h2>Raw JSON</h2>
                <pre id="jsonResult">{}</pre>
            </div>
        </section>
    </main>

    <script>
        const apiBase = window.location.origin;

        function buildUrl() {
            const params = new URLSearchParams();
            const keyword = document.getElementById('keyword').value.trim();
            const category = document.getElementById('category').value;
            const minPrice = document.getElementById('minPrice').value;
            const maxPrice = document.getElementById('maxPrice').value;
            if (keyword) params.set('keyword', keyword);
            if (category) params.set('category', category);
            if (minPrice) params.set('minPrice', minPrice);
            if (maxPrice) params.set('maxPrice', maxPrice);
            params.set('limit', '50');
            return `${apiBase}/api/products?${params.toString()}`;
        }

        async function queryProducts() {
            const error = document.getElementById('error');
            const requestUrl = document.getElementById('requestUrl');
            const jsonResult = document.getElementById('jsonResult');
            const cards = document.getElementById('cards');
            const url = buildUrl();
            error.textContent = '';
            requestUrl.textContent = url;
            cards.innerHTML = '<div class="card">Loading open API...</div>';
            try {
                const response = await fetch(url);
                const data = await response.json();
                jsonResult.textContent = JSON.stringify(data, null, 2);
                if (!response.ok) throw new Error(data.error || 'Request failed.');
                renderCards(data.products || []);
            } catch (err) {
                error.textContent = err.message || 'Network error.';
                cards.innerHTML = '<div class="card">Request failed. Please check whether the backend is running.</div>';
            }
        }

        function renderCards(products) {
            const cards = document.getElementById('cards');
            if (!products.length) {
                cards.innerHTML = '<div class="card">No matched products.</div>';
                return;
            }
            cards.innerHTML = products.map((product) => `
                <article class="card">
                    <h3>${escapeHtml(product.title || 'Untitled product')}</h3>
                    <p>${escapeHtml(product.description || '')}</p>
                    <div class="meta">
                        <span>Category: ${escapeHtml(product.category || '-')}</span>
                        <span>Condition: ${escapeHtml(product.condition || '-')}</span>
                        <span>Seller: ${escapeHtml(product.seller?.nickname || 'Unknown')}</span>
                    </div>
                    <div class="price">¥${product.priceFiat ?? '-'}</div>
                </article>
            `).join('');
        }

        function resetFilters() {
            document.getElementById('keyword').value = '';
            document.getElementById('category').value = '';
            document.getElementById('minPrice').value = '';
            document.getElementById('maxPrice').value = '';
            queryProducts();
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        queryProducts();
    </script>
</body>
</html>
