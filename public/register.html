<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Campus Trade</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div id="app" class="bg-white w-full max-w-md rounded-xl shadow p-8">
        <h1 class="text-2xl font-black text-indigo-700 mb-6">Create Account</h1>
        <div class="space-y-4">
            <input v-model="form.email" class="w-full border rounded px-3 py-2" placeholder="Email">
            <input v-model="form.nickname" class="w-full border rounded px-3 py-2" placeholder="Nickname">
            <input v-model="form.password" type="password" class="w-full border rounded px-3 py-2" placeholder="Password">
            <button @click="register" class="w-full bg-indigo-600 text-white font-bold py-2 rounded hover:bg-indigo-700">Register</button>
            <p v-if="error" class="text-red-600 text-sm">{{ error }}</p>
            <p class="text-sm text-gray-500">Already have an account? <a class="text-indigo-600 font-bold" href="login.html">Login</a></p>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const form = ref({ email: '', nickname: '', password: '' });
                const error = ref('');

                const register = async () => {
                    error.value = '';
                    if (!form.value.email || !form.value.nickname || !form.value.password) {
                        error.value = 'Email, nickname and password are required.';
                        return;
                    }

                    try {
                        const res = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(form.value)
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            error.value = data.error || 'Register failed.';
                            return;
                        }
                        alert('Register success. Please login.');
                        window.location.href = 'login.html';
                    } catch (e) {
                        error.value = 'Network error.';
                    }
                };

                return { form, error, register };
            }
        }).mount('#app');
    </script>
</body>
</html>
