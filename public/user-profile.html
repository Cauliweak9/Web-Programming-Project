<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Credit Profile - Campus Trade</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app">
        <nav class="bg-indigo-600 text-white p-4 shadow flex flex-col md:flex-row md:justify-between md:items-center gap-3">
            <h1 class="text-xl font-bold">User Credit Profile</h1>
            <div class="flex gap-3 text-sm">
                <button @click="goHome" class="hover:text-indigo-200">Home</button>
                <button @click="goOrders" class="hover:text-indigo-200">My Orders</button>
                <button @click="goSkill" class="hover:text-indigo-200">Skill Demo</button>
            </div>
        </nav>

        <main class="container mx-auto p-6 max-w-4xl">
            <div v-if="loading" class="bg-white rounded-xl shadow p-10 text-center text-gray-500">Loading profile...</div>
            <div v-else-if="error" class="bg-white rounded-xl shadow p-10 text-center">
                <p class="text-red-600 font-bold mb-4">{{ error }}</p>
                <p v-if="missingId" class="text-gray-500 mb-4">Please enter this page from product detail or review records.</p>
                <button @click="goHome" class="bg-indigo-600 text-white px-4 py-2 rounded">Back Home</button>
            </div>

            <template v-else>
                <section class="bg-white rounded-xl shadow p-6 mb-6">
                    <h2 class="text-3xl font-black text-gray-900">{{ profile.user.nickname }}</h2>
                    <p class="text-gray-500 mt-1">{{ profile.user.email }}</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                        <div class="bg-indigo-50 rounded-lg p-4">
                            <div class="text-sm text-indigo-700 font-bold">Credit Score</div>
                            <div class="text-3xl font-black text-indigo-900">{{ profile.user.creditRating }}</div>
                        </div>
                        <div class="bg-yellow-50 rounded-lg p-4">
                            <div class="text-sm text-yellow-700 font-bold">Average Rating</div>
                            <div class="text-3xl font-black text-yellow-700">{{ profile.averageRating || 0 }} star</div>
                        </div>
                        <div class="bg-green-50 rounded-lg p-4">
                            <div class="text-sm text-green-700 font-bold">Review Count</div>
                            <div class="text-3xl font-black text-green-900">{{ profile.reviewsCount }}</div>
                        </div>
                    </div>
                </section>

                <section class="space-y-4">
                    <div v-if="profile.reviews.length === 0" class="bg-white rounded-xl shadow p-10 text-center text-gray-500">
                        No public reviews yet.
                    </div>
                    <article v-for="review in profile.reviews" :key="review.id" class="bg-white rounded-xl shadow p-5">
                        <div class="flex justify-between items-start gap-4">
                            <div>
                                <div class="text-yellow-400 text-xl">{{ stars(review.rating) }}</div>
                                <p class="text-gray-700 mt-2 whitespace-pre-wrap">{{ review.content }}</p>
                                <p class="text-sm text-gray-400 mt-3">
                                    From {{ review.reviewer?.nickname || 'Anonymous user' }}
                                    <span v-if="review.order?.product"> - {{ review.order.product.title }}</span>
                                </p>
                            </div>
                            <div class="text-xs text-gray-400 shrink-0">{{ formatDate(review.createdAt) }}</div>
                        </div>
                    </article>
                </section>
            </template>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_BASE = window.location.origin;

        createApp({
            setup() {
                const profile = ref(null);
                const loading = ref(true);
                const error = ref('');
                const missingId = ref(false);
                const id = new URLSearchParams(window.location.search).get('id');

                onMounted(fetchProfile);

                async function fetchProfile() {
                    if (!id) {
                        missingId.value = true;
                        error.value = 'Missing user id.';
                        loading.value = false;
                        return;
                    }
                    try {
                        const res = await fetch(`${API_BASE}/api/reviews/user/${id}`);
                        const data = await res.json();
                        if (!res.ok) {
                            error.value = data.error || 'User not found.';
                            return;
                        }
                        profile.value = data;
                    } catch (e) {
                        error.value = 'Network error. Cannot load profile.';
                    } finally {
                        loading.value = false;
                    }
                }

                const stars = (rating) => '*'.repeat(rating) + '-'.repeat(5 - rating);
                const formatDate = (date) => new Date(date).toLocaleString();
                const goHome = () => { window.location.href = 'index.html'; };
                const goOrders = () => { window.location.href = 'dashboard.html'; };
                const goSkill = () => { window.location.href = 'skill-demo.html'; };

                return { profile, loading, error, missingId, stars, formatDate, goHome, goOrders, goSkill };
            }
        }).mount('#app');
    </script>
</body>
</html>
