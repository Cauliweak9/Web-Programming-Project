<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评价卖家 - 校园二手交易平台</title>
    <script src="/vendor/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav></nav>
    <div id="app">
        <main class="container mx-auto p-6 max-w-3xl">
            <div v-if="loading" class="bg-white rounded-xl shadow p-8 text-center text-gray-500">正在加载订单...</div>
            <div v-else-if="error" class="bg-white rounded-xl shadow p-8 text-center text-red-600">{{ error }}</div>

            <section v-else class="bg-white rounded-xl shadow p-6">
                <h1 class="text-2xl font-black text-gray-900 mb-2">{{ order.product?.title || '订单 #' + order.id }}</h1>
                <p class="text-gray-500 mb-6">卖家：{{ order.seller?.nickname || order.seller?.email || order.sellerId }}</p>

                <label class="block text-sm font-bold text-gray-700 mb-2">星级评分</label>
                <div class="flex gap-2 mb-5">
                    <button v-for="n in 5" :key="n" @click="rating = n" class="text-3xl" :class="n <= rating ? 'text-yellow-400' : 'text-gray-300'">★</button>
                </div>

                <label class="block text-sm font-bold text-gray-700 mb-2">文字评价</label>
                <textarea v-model="content" rows="5" class="w-full border rounded p-3 mb-4" placeholder="请写下本次交易体验..."></textarea>

                <p v-if="submitError" class="text-red-600 mb-3">{{ submitError }}</p>

                <div v-if="submitted" class="bg-green-50 border border-green-200 text-green-700 rounded p-4 mb-4">
                    评价提交成功。
                    <button @click="viewSellerProfile" class="ml-2 text-indigo-600 font-bold">查看卖家信誉</button>
                </div>

                <div class="flex justify-end gap-3">
                    <button @click="goBack" class="bg-gray-200 text-gray-700 px-4 py-2 rounded">返回订单</button>
                    <button @click="submitReview" :disabled="submitted" class="bg-indigo-600 disabled:bg-indigo-300 text-white px-4 py-2 rounded">提交评价</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_BASE = window.location.origin;

        createApp({
            setup() {
                const token = localStorage.getItem('jwt_token') || localStorage.getItem('token');
                const orderId = new URLSearchParams(window.location.search).get('orderId');
                const order = ref(null);
                const rating = ref(5);
                const content = ref('');
                const loading = ref(true);
                const error = ref('');
                const submitError = ref('');
                const submitted = ref(false);
                const myUserId = ref(null);

                const authHeaders = {
                    'Content-Type': 'application/json',
                    ...(token ? { Authorization: `Bearer ${token}` } : {})
                };

                onMounted(() => {
                    if (!token) {
                        alert('请先登录');
                        window.location.href = 'login.html';
                        return;
                    }
                    try {
                        myUserId.value = JSON.parse(atob(token.split('.')[1])).userId;
                    } catch (e) {}
                    fetchOrder();
                });

                const fetchOrder = async () => {
                    if (!orderId) {
                        error.value = '缺少订单 ID';
                        loading.value = false;
                        return;
                    }
                    try {
                        const res = await fetch(`${API_BASE}/api/orders`, { headers: authHeaders });
                        const data = await res.json();
                        const found = (data.orders || data || []).find(item => String(item.id) === String(orderId));
                        if (!found) {
                            error.value = '订单不存在或无权访问';
                            return;
                        }
                        if (found.buyerId !== myUserId.value) {
                            error.value = '只有买家可以评价该订单';
                            return;
                        }
                        if (found.status !== 'COMPLETED') {
                            error.value = '只有已完成订单才能评价';
                            return;
                        }
                        if ((found.reviews || []).some(review => review.reviewerId === myUserId.value)) {
                            error.value = '该订单已经评价过';
                            return;
                        }
                        order.value = found;
                    } catch (e) {
                        error.value = '网络错误，无法加载订单';
                    } finally {
                        loading.value = false;
                    }
                };

                const submitReview = async () => {
                    submitError.value = '';
                    if (!content.value.trim()) {
                        submitError.value = '请填写评价内容';
                        return;
                    }
                    try {
                        const res = await fetch(`${API_BASE}/api/reviews`, {
                            method: 'POST',
                            headers: authHeaders,
                            body: JSON.stringify({
                                orderId: order.value.id,
                                revieweeId: order.value.sellerId,
                                rating: rating.value,
                                content: content.value
                            })
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            submitError.value = data.error || '提交失败';
                            return;
                        }
                        submitted.value = true;
                    } catch (e) {
                        submitError.value = '网络错误';
                    }
                };

                const viewSellerProfile = () => {
                    if (!order.value?.sellerId) return;
                    window.location.href = `user-profile.html?id=${order.value.sellerId}`;
                };
                const goBack = () => { window.location.href = 'dashboard.html'; };

                return { order, rating, content, loading, error, submitError, submitted, submitReview, viewSellerProfile, goBack };
            }
        }).mount('#app');
    </script>
    <script src="/nav.js"></script>
</body>
</html>
