<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Seller - Campus Trade</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app">
        <nav class="bg-indigo-600 text-white p-4 shadow flex justify-between items-center">
            <h1 class="text-xl font-bold">Review Seller</h1>
            <button @click="goBack" class="bg-white/15 px-4 py-1.5 rounded hover:bg-white/25">Back to Orders</button>
        </nav>

        <main class="container mx-auto p-6 max-w-3xl">
            <div v-if="loading" class="bg-white rounded-xl shadow p-8 text-center text-gray-500">Loading order...</div>
            <div v-else-if="error" class="bg-white rounded-xl shadow p-8 text-center text-red-600">{{ error }}</div>

            <section v-else class="bg-white rounded-xl shadow p-6">
                <h2 class="text-2xl font-black text-gray-900 mb-2">{{ order.product?.title || 'Order #' + order.id }}</h2>
                <p class="text-gray-500 mb-6">Seller: {{ order.seller?.nickname || order.seller?.email || order.sellerId }}</p>

                <label class="block text-sm font-bold text-gray-700 mb-2">Rating</label>
                <div class="flex gap-2 mb-5">
                    <button v-for="n in 5" :key="n" @click="rating = n" class="text-3xl" :class="n <= rating ? 'text-yellow-400' : 'text-gray-300'">★</button>
                </div>

                <label class="block text-sm font-bold text-gray-700 mb-2">Review Content</label>
                <textarea v-model="content" rows="5" class="w-full border rounded p-3 mb-4" placeholder="Write your review..."></textarea>

                <p v-if="submitError" class="text-red-600 mb-3">{{ submitError }}</p>

                <div v-if="submitted" class="bg-green-50 border border-green-200 text-green-700 rounded p-4 mb-4">
                    Review submitted successfully.
                    <button @click="viewSellerProfile" class="ml-2 text-indigo-600 font-bold">View seller profile</button>
                </div>

                <div class="flex justify-end gap-3">
                    <button @click="goBack" class="bg-gray-200 text-gray-700 px-4 py-2 rounded">Cancel</button>
                    <button @click="submitReview" :disabled="submitted" class="bg-indigo-600 disabled:bg-indigo-300 text-white px-4 py-2 rounded">Submit Review</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_BASE = window.location.origin;

        createApp({
            setup() {
                const token = localStorage.getItem('jwt_token');
                const orderId = new URLSearchParams(window.location.search).get('orderId');
                const order = ref(null);
                const rating = ref(5);
                const content = ref('');
                const loading = ref(true);
                const error = ref('');
                const submitError = ref('');
                const submitted = ref(false);
                const myUserId = ref(null);

                const authHeaders = {
                    'Content-Type': 'application/json',
                    ...(token ? { Authorization: `Bearer ${token}` } : {})
                };

                onMounted(() => {
                    if (!token) {
                        alert('Please login first.');
                        window.location.href = 'login.html';
                        return;
                    }
                    try {
                        myUserId.value = JSON.parse(atob(token.split('.')[1])).userId;
                    } catch (e) {}
                    fetchOrder();
                });

                const fetchOrder = async () => {
                    if (!orderId) {
                        error.value = 'Missing order id.';
                        loading.value = false;
                        return;
                    }
                    try {
                        const res = await fetch(`${API_BASE}/api/orders`, { headers: authHeaders });
                        const data = await res.json();
                        const found = (data.orders || data || []).find(item => String(item.id) === String(orderId));
                        if (!found) {
                            error.value = 'Order not found or no permission.';
                            return;
                        }
                        if (found.buyerId !== myUserId.value) {
                            error.value = 'Only the buyer can review this order.';
                            return;
                        }
                        if (found.status !== 'COMPLETED') {
                            error.value = 'Only completed orders can be reviewed.';
                            return;
                        }
                        if ((found.reviews || []).some(review => review.reviewerId === myUserId.value)) {
                            error.value = 'This order has already been reviewed.';
                            return;
                        }
                        order.value = found;
                    } catch (e) {
                        error.value = 'Network error. Cannot load order.';
                    } finally {
                        loading.value = false;
                    }
                };

                const submitReview = async () => {
                    submitError.value = '';
                    if (!content.value.trim()) {
                        submitError.value = 'Please write review content.';
                        return;
                    }
                    try {
                        const res = await fetch(`${API_BASE}/api/reviews`, {
                            method: 'POST',
                            headers: authHeaders,
                            body: JSON.stringify({
                                orderId: order.value.id,
                                revieweeId: order.value.sellerId,
                                rating: rating.value,
                                content: content.value
                            })
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            submitError.value = data.error || 'Submit failed.';
                            return;
                        }
                        submitted.value = true;
                    } catch (e) {
                        submitError.value = 'Network error.';
                    }
                };

                const viewSellerProfile = () => {
                    if (!order.value?.sellerId) return;
                    window.location.href = `user-profile.html?id=${order.value.sellerId}`;
                };
                const goBack = () => { window.location.href = 'dashboard.html'; };

                return { order, rating, content, loading, error, submitError, submitted, submitReview, viewSellerProfile, goBack };
            }
        }).mount('#app');
    </script>
</body>
</html>
