<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/vendor/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>系统登录</title>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav></nav>
    <main class="min-h-[calc(100vh-72px)] flex items-center justify-center p-4">
    <div id="app" class="bg-white p-8 rounded-xl shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">用户登录</h2>
        <input v-model="email" class="w-full mb-4 p-3 border rounded" placeholder="邮箱 (例如: test@test.com)">
        <input v-model="password" type="password" class="w-full mb-6 p-3 border rounded" placeholder="密码">
        <button @click="login" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 transition">立即登录</button>
        <div class="mt-4 text-center text-sm">
            <a href="register.html" class="text-blue-600 hover:underline">没有账号？去注册一个</a>
        </div>
        <p class="mt-4 text-red-500 text-center text-sm">{{ error }}</p>
    </div>
    </main>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const email = ref('');
                const password = ref('');
                const error = ref('');

                const login = async () => {
                    try {
                        const res = await fetch('http://localhost:3000/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: email.value, password: password.value })
                        });
                        const data = await res.json();
                        if (res.ok) {
                            localStorage.setItem('jwt_token', data.token);
                            localStorage.setItem('token', data.token);
                            if (data.user) {
                                localStorage.setItem('user', JSON.stringify(data.user));
                                localStorage.setItem('role', data.user.role);
                            } else if (data.role) {
                                localStorage.setItem('role', data.role);
                            }
                            window.location.href = 'index.html'; // 登录成功跳转到交易大厅
                        } else {
                            error.value = data.error;
                        }
                    } catch (e) { error.value = '后端服务连接失败'; }
                };
                return { email, password, error, login };
            }
        }).mount('#app');
    </script>
    <script src="/nav.js"></script>
</body>
</html>
