<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>交易大厅 - Web3 Escrow</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app">
        <nav class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">📦 Decentralized Escrow Market</h1>
            <div class="space-x-4">
                <button @click="goToDashboard" class="hover:text-indigo-200 transition">我的订单</button>
                <button @click="logout" class="bg-red-500 px-4 py-1.5 rounded shadow hover:bg-red-600 transition">退出登录</button>
            </div>
        </nav>

        <div class="container mx-auto p-6 flex flex-col md:flex-row gap-8">
            <div class="w-full md:w-1/3 bg-white p-6 rounded-xl shadow-md h-fit border-t-4 border-indigo-500">
                <h2 class="text-lg font-bold mb-4 text-gray-800 border-b pb-2">➕ 发布新商品</h2>
                <input v-model="newProduct.title" class="w-full mb-3 p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="商品标题">
                <textarea v-model="newProduct.description" class="w-full mb-3 p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="商品详细描述" rows="3"></textarea>
                
                <div class="flex gap-3 mb-3">
                    <input v-model="newProduct.priceFiat" type="number" class="w-1/2 p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="价格 (法币)">
                    <input v-model="newProduct.category" class="w-1/2 p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="分类 (如: 电子)">
                </div>
                
                <input v-model="newProduct.condition" class="w-full mb-5 p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="成色 (如: 95新)">
                
                <button @click="publishProduct" class="w-full bg-green-500 text-white font-bold p-3 rounded hover:bg-green-600 transition shadow-lg">
                    上架商品
                </button>
                <p class="mt-3 text-sm text-center text-red-500">{{ pubError }}</p>
            </div>

            <div class="w-full md:w-2/3">
                <h2 class="text-xl font-bold mb-4 text-gray-800">市场在售商品</h2>
                
                <div v-if="products.length === 0" class="text-gray-500 text-center py-10 bg-white rounded-xl shadow-sm">
                    📭 暂无商品，快去左侧发布你的第一个商品吧！
                </div>
                
                <div class="grid grid-cols-1 xl:grid-cols-2 gap-5">
                    <div v-for="p in products" :key="p.id" class="bg-white p-5 rounded-xl shadow-md border border-gray-100 hover:shadow-lg transition">
                        <h3 class="font-bold text-xl text-indigo-700 mb-1">{{ p.title }}</h3>
                        <p class="text-gray-500 text-sm mb-3 line-clamp-2 h-10">{{ p.description }}</p>
                        
                        <div class="flex justify-between items-center text-xs text-gray-400 mb-4 bg-gray-50 p-2 rounded">
                            <span>🏷️ {{ p.category }}</span>
                            <span>✨ {{ p.condition }}</span>
                        </div>
                        
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-2xl font-black text-red-500">¥{{ p.priceFiat }}</span>
                            <button @click="buyProduct(p)" class="bg-indigo-600 text-white font-bold px-5 py-2 rounded-lg hover:bg-indigo-700 transition">
                                立即购买
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const token = localStorage.getItem('jwt_token');
                const products = ref([]);
                const pubError = ref('');
                
                // 双向绑定的表单数据
                const newProduct = ref({
                    title: '', description: '', priceFiat: '', category: '', condition: ''
                });

                // 统一的带 Token 请求头
                const authHeaders = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                };

                // 页面加载时立刻执行
                onMounted(() => {
                    if (!token) {
                        alert('请先登录！');
                        window.location.href = 'login.html';
                        return;
                    }
                    fetchProducts();
                });

                // 1. 获取商品列表 API
                const fetchProducts = async () => {
                    try {
                        // 假设你的商品路由挂载在 /api/products
                        const res = await fetch('http://localhost:3000/api/products', { headers: authHeaders });
                        if (res.ok) {
                            const data = await res.json();
                            products.value = data.products || [];
                        }
                    } catch (e) { console.error('获取商品失败', e); }
                };

                // 2. 发布商品 API
                const publishProduct = async () => {
                    pubError.value = '';
                    if (!newProduct.value.title || !newProduct.value.priceFiat) {
                        pubError.value = '标题和价格不能为空'; return;
                    }
                    
                    try {
                        const payload = {
                            ...newProduct.value,
                            priceFiat: parseFloat(newProduct.value.priceFiat) // 确保价格是数字
                        };

                        const res = await fetch('http://localhost:3000/api/products', {
                            method: 'POST',
                            headers: authHeaders,
                            body: JSON.stringify(payload)
                        });
                        
                        if (res.ok) {
                            alert('商品上架成功！');
                            // 清空表单并重新拉取列表
                            newProduct.value = { title: '', description: '', priceFiat: '', category: '', condition: '' };
                            fetchProducts();
                        } else {
                            const data = await res.json();
                            pubError.value = data.error || '发布失败';
                        }
                    } catch (e) { pubError.value = '网络错误'; }
                };

                // 3. 购买商品 (创单) API
                // 修改后的 buyProduct 函数
                const buyProduct = async (product) => {
                    if(!confirm(`确认购买商品《${product.title}》吗？`)) return;

                    // 🎯 动态计算或模拟一个 cryptoAmount 满足后端校验
                    // 比如 3500 元的 iPad，折合大概 0.175 个代币
                    const simulatedCryptoAmount = parseFloat((product.priceFiat / 20000).toFixed(4)) || 0.1;

                    try {
                        const res = await fetch('http://localhost:3000/api/orders', {
                            method: 'POST',
                            headers: authHeaders,
                            body: JSON.stringify({ 
                                productId: product.id,
                                cryptoAmount: simulatedCryptoAmount // 👈 补齐后端要的必要参数
                            })
                        });

                        if (res.ok) {
                            alert('下单成功！即将跳转到您的订单中心。');
                            window.location.href = 'dashboard.html';
                        } else {
                            const data = await res.json();
                            alert(`下单失败: ${data.error}`);
                        }
                    } catch (e) { alert('网络错误'); }
                };

                // 导航逻辑
                const logout = () => {
                    localStorage.removeItem('jwt_token');
                    window.location.href = 'login.html';
                };
                const goToDashboard = () => { window.location.href = 'dashboard.html'; };

                return { 
                    products, newProduct, pubError, 
                    publishProduct, buyProduct, logout, goToDashboard 
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
