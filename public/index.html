<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>交易大厅 - Web3 Escrow</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app">
        <nav class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">校园二手交易大厅</h1>
            <div class="space-x-4">
                <button @click="goToMyProducts" class="hover:text-indigo-200 transition">我的发布</button>
                <button @click="goToDashboard" class="hover:text-indigo-200 transition">我的订单</button>
                <button @click="goToApiDemo" class="hover:text-indigo-200 transition">开放 API 示例</button>
                <button v-if="isAdmin" @click="goToAdmin" class="hover:text-indigo-200 transition">后台管理</button>
                <button @click="logout" class="bg-red-500 px-4 py-1.5 rounded shadow hover:bg-red-600 transition">退出登录</button>
            </div>
        </nav>

        <div class="container mx-auto p-6 flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-1/3 bg-white p-6 rounded-xl shadow-md h-fit border-t-4 border-indigo-500">
                <h2 class="text-lg font-bold mb-4 text-gray-800 border-b pb-2">发布新商品</h2>
                <input v-model="newProduct.title" class="w-full mb-3 p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="商品标题">
                <textarea v-model="newProduct.description" class="w-full mb-3 p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="商品详细描述" rows="3"></textarea>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                    <input v-model="newProduct.priceFiat" type="number" min="0" class="p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="现价">
                    <input v-model="newProduct.originalPrice" type="number" min="0" class="p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="原价">
                    <input v-model="newProduct.category" class="p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="分类">
                    <input v-model="newProduct.condition" class="p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="成色">
                </div>

                <input v-model="newProduct.imageUrl" class="w-full mb-5 p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="图片 URL">

                <button @click="publishProduct" class="w-full bg-green-500 text-white font-bold p-3 rounded hover:bg-green-600 transition shadow-lg">
                    上架商品
                </button>
                <p class="mt-3 text-sm text-center text-red-500">{{ pubError }}</p>
            </div>

            <div class="w-full lg:w-2/3">
                <div class="bg-white p-5 rounded-xl shadow-sm mb-5">
                    <h2 class="text-xl font-bold mb-4 text-gray-800">市场在售商品</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                        <input v-model="filters.keyword" @keyup.enter="fetchProducts" class="p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400 md:col-span-2" placeholder="搜索标题、描述或分类">
                        <select v-model="filters.category" class="p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400">
                            <option value="">全部分类</option>
                            <option v-for="category in categories" :key="category" :value="category">{{ category }}</option>
                        </select>
                        <button @click="fetchProducts" class="bg-indigo-600 text-white font-bold rounded hover:bg-indigo-700 transition">搜索</button>
                        <input v-model="filters.minPrice" type="number" min="0" class="p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="最低价">
                        <input v-model="filters.maxPrice" type="number" min="0" class="p-2.5 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="最高价">
                        <button @click="resetFilters" class="bg-gray-200 text-gray-700 font-bold rounded hover:bg-gray-300 transition md:col-span-2">重置筛选</button>
                    </div>
                </div>

                <div v-if="products.length === 0" class="text-gray-500 text-center py-10 bg-white rounded-xl shadow-sm">
                    暂无商品，换个筛选条件试试，或者发布你的第一个商品。
                </div>

                <div class="grid grid-cols-1 xl:grid-cols-2 gap-5">
                    <div v-for="p in products" :key="p.id" class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden hover:shadow-lg transition">
                        <div class="h-44 bg-gray-100">
                            <img v-if="p.imageUrl" :src="p.imageUrl" :alt="p.title" class="w-full h-full object-cover" @error="handleImageError">
                            <div v-else class="w-full h-full flex items-center justify-center text-gray-400">暂无图片</div>
                        </div>
                        <div class="p-5">
                            <h3 class="font-bold text-xl text-indigo-700 mb-1">{{ p.title }}</h3>
                            <p class="text-gray-500 text-sm mb-3 line-clamp-2 h-10">{{ p.description }}</p>

                            <div class="flex justify-between items-center text-xs text-gray-500 mb-4 bg-gray-50 p-2 rounded">
                                <span>{{ p.category }}</span>
                                <span>{{ p.condition }}</span>
                            </div>
                            <div class="text-sm text-gray-500 mb-4">
                                卖家：{{ p.seller?.nickname || '未知卖家' }}
                                <button v-if="p.seller?.id" @click="viewSellerProfile(p.seller.id)" class="ml-2 text-indigo-600 font-bold hover:text-indigo-800">查看信誉</button>
                            </div>

                            <div class="flex justify-between items-end gap-3">
                                <div>
                                    <div class="text-2xl font-black text-red-500">¥{{ p.priceFiat }}</div>
                                    <div v-if="p.originalPrice" class="text-sm text-gray-400 line-through">原价 ¥{{ p.originalPrice }}</div>
                                </div>
                                <div class="flex gap-2 shrink-0">
                                    <button @click="viewDetail(p.id)" class="bg-gray-100 text-gray-700 font-bold px-4 py-2 rounded-lg hover:bg-gray-200 transition">
                                        查看详情
                                    </button>
                                    <button @click="buyProduct(p)" class="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
                                        立即购买
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const API_BASE = window.location.origin;

        createApp({
            setup() {
                const token = localStorage.getItem('jwt_token');
                const products = ref([]);
                const pubError = ref('');
                const isAdmin = ref(false);
                const filters = ref({ keyword: '', category: '', minPrice: '', maxPrice: '' });
                const newProduct = ref({
                    title: '',
                    description: '',
                    priceFiat: '',
                    originalPrice: '',
                    category: '',
                    condition: '',
                    imageUrl: ''
                });

                const authHeaders = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                };

                const categories = computed(() => {
                    return [...new Set(products.value.map((p) => p.category).filter(Boolean))];
                });

                onMounted(() => {
                    if (!token) {
                        alert('请先登录');
                        window.location.href = 'login.html';
                        return;
                    }
                    checkAdminAccess();
                    fetchProducts();
                });

                const checkAdminAccess = async () => {
                    try {
                        const res = await fetch(`${API_BASE}/api/admin/orders`, { headers: authHeaders });
                        isAdmin.value = res.ok;
                    } catch (e) {
                        isAdmin.value = false;
                    }
                };

                const fetchProducts = async () => {
                    try {
                        const params = new URLSearchParams();
                        Object.entries(filters.value).forEach(([key, value]) => {
                            if (value !== '') params.set(key, value);
                        });
                        params.set('limit', '50');

                        const res = await fetch(`${API_BASE}/api/products?${params.toString()}`, { headers: authHeaders });
                        if (res.ok) {
                            const data = await res.json();
                            products.value = data.products || [];
                        }
                    } catch (e) {
                        console.error('获取商品失败', e);
                    }
                };

                const resetFilters = () => {
                    filters.value = { keyword: '', category: '', minPrice: '', maxPrice: '' };
                    fetchProducts();
                };

                const publishProduct = async () => {
                    pubError.value = '';
                    if (!newProduct.value.title || !newProduct.value.description || !newProduct.value.category || !newProduct.value.priceFiat || !newProduct.value.condition) {
                        pubError.value = '标题、描述、分类、价格和成色不能为空';
                        return;
                    }

                    try {
                        const payload = {
                            ...newProduct.value,
                            priceFiat: parseFloat(newProduct.value.priceFiat),
                            originalPrice: newProduct.value.originalPrice ? parseFloat(newProduct.value.originalPrice) : null
                        };

                        const res = await fetch(`${API_BASE}/api/products`, {
                            method: 'POST',
                            headers: authHeaders,
                            body: JSON.stringify(payload)
                        });

                        if (res.ok) {
                            alert('商品上架成功');
                            newProduct.value = { title: '', description: '', priceFiat: '', originalPrice: '', category: '', condition: '', imageUrl: '' };
                            fetchProducts();
                        } else {
                            const data = await res.json();
                            pubError.value = data.error || '发布失败';
                        }
                    } catch (e) {
                        pubError.value = '网络错误';
                    }
                };

                const buyProduct = async (product) => {
                    if (!confirm(`确认购买商品《${product.title}》吗？`)) return;
                    const simulatedCryptoAmount = parseFloat((product.priceFiat / 20000).toFixed(4)) || 0.1;

                    try {
                        const res = await fetch(`${API_BASE}/api/orders`, {
                            method: 'POST',
                            headers: authHeaders,
                            body: JSON.stringify({
                                productId: product.id,
                                cryptoAmount: simulatedCryptoAmount
                            })
                        });

                        if (res.ok) {
                            alert('下单成功，即将跳转到订单中心。');
                            window.location.href = 'dashboard.html';
                        } else {
                            const data = await res.json();
                            alert(`下单失败: ${data.error}`);
                        }
                    } catch (e) {
                        alert('网络错误');
                    }
                };

                const handleImageError = (event) => {
                    event.target.style.display = 'none';
                };

                const viewDetail = (id) => {
                    window.location.href = `product-detail.html?id=${id}`;
                };

                const viewSellerProfile = (sellerId) => {
                    if (!sellerId) return;
                    window.location.href = `user-profile.html?id=${sellerId}`;
                };

                const logout = () => {
                    localStorage.removeItem('jwt_token');
                    window.location.href = 'login.html';
                };
                const goToDashboard = () => { window.location.href = 'dashboard.html'; };
                const goToMyProducts = () => { window.location.href = 'my-products.html'; };
                const goToApiDemo = () => { window.location.href = 'third-party-demo.html'; };
                const goToAdmin = () => { window.location.href = 'admin.html'; };

                return {
                    products,
                    isAdmin,
                    newProduct,
                    pubError,
                    filters,
                    categories,
                    publishProduct,
                    fetchProducts,
                    resetFilters,
                    buyProduct,
                    viewDetail,
                    viewSellerProfile,
                    handleImageError,
                    logout,
                    goToDashboard,
                    goToMyProducts,
                    goToApiDemo,
                    goToAdmin
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
