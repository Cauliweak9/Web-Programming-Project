<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理控制台 - 校园二手交易平台</title>
    <script src="/vendor/vue.global.prod.js"></script>
    <script src="/vendor/ethers.umd.min.js"></script>
    <script src="/web3.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen text-gray-200">
    <nav></nav>
    <div id="app">
        <main class="container mx-auto p-6 max-w-7xl mt-6 space-y-10">
            <div v-if="authError" class="bg-red-900/40 border border-red-700 text-red-200 rounded-xl p-6">
                {{ authError }}
                <button @click="goToMarket" class="ml-3 underline">返回商品大厅</button>
            </div>

            <template v-else>
                <section>
                    <h1 class="text-2xl font-black text-yellow-400 mb-6">后台管理控制台</h1>
                    <h2 class="text-xl font-bold text-white border-l-4 border-yellow-500 pl-3 mb-5">数据统计</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="bg-gray-800 rounded-xl p-5 border border-gray-700"><div class="text-gray-400 text-sm">用户数</div><div class="text-3xl font-black text-white">{{ stats.usersCount || 0 }}</div></div>
                        <div class="bg-gray-800 rounded-xl p-5 border border-gray-700"><div class="text-gray-400 text-sm">商品数</div><div class="text-3xl font-black text-white">{{ stats.productsCount || 0 }}</div></div>
                        <div class="bg-gray-800 rounded-xl p-5 border border-gray-700"><div class="text-gray-400 text-sm">订单数</div><div class="text-3xl font-black text-white">{{ stats.ordersCount || 0 }}</div></div>
                        <div class="bg-gray-800 rounded-xl p-5 border border-gray-700"><div class="text-gray-400 text-sm">已完成交易额</div><div class="text-3xl font-black text-yellow-400">¥{{ stats.completedTradeAmount || 0 }}</div></div>
                    </div>
                </section>

                <section>
                    <h2 class="text-xl font-bold text-white border-l-4 border-yellow-500 pl-3 mb-5">用户管理</h2>
                    <div class="overflow-x-auto bg-gray-800 rounded-xl border border-gray-700">
                        <table class="w-full text-left">
                            <thead><tr class="bg-gray-900 text-gray-400 text-sm"><th class="p-4">ID</th><th class="p-4">邮箱</th><th class="p-4">昵称</th><th class="p-4">角色</th><th class="p-4">信用分</th><th class="p-4">状态</th><th class="p-4 text-center">操作</th></tr></thead>
                            <tbody class="divide-y divide-gray-700">
                                <tr v-for="user in users" :key="user.id" class="hover:bg-gray-700">
                                    <td class="p-4 font-mono text-yellow-500">#{{ user.id }}</td>
                                    <td class="p-4">{{ user.email }}</td>
                                    <td class="p-4">{{ user.nickname }}</td>
                                    <td class="p-4">{{ user.role === 'ADMIN' ? '管理员' : '普通用户' }}</td>
                                    <td class="p-4">{{ user.creditRating }}</td>
                                    <td class="p-4">{{ user.isBanned ? '已封禁' : '正常' }}</td>
                                    <td class="p-4 flex justify-center gap-2">
                                        <button v-if="!user.isBanned" @click="banUser(user)" class="bg-red-600 text-white text-xs px-3 py-1.5 rounded">封禁</button>
                                        <button v-else @click="unbanUser(user)" class="bg-green-600 text-white text-xs px-3 py-1.5 rounded">解封</button>
                                        <button @click="resetPassword(user)" class="bg-yellow-600 text-white text-xs px-3 py-1.5 rounded">重置密码</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section>
                    <h2 class="text-xl font-bold text-white border-l-4 border-yellow-500 pl-3 mb-5">商品管理</h2>
                    <div class="overflow-x-auto bg-gray-800 rounded-xl border border-gray-700">
                        <table class="w-full text-left">
                            <thead><tr class="bg-gray-900 text-gray-400 text-sm"><th class="p-4">ID</th><th class="p-4">标题</th><th class="p-4">分类</th><th class="p-4">价格</th><th class="p-4">卖家</th><th class="p-4">在售</th><th class="p-4 text-center">操作</th></tr></thead>
                            <tbody class="divide-y divide-gray-700">
                                <tr v-for="product in products" :key="product.id" class="hover:bg-gray-700">
                                    <td class="p-4 font-mono text-yellow-500">#{{ product.id }}</td>
                                    <td class="p-4">{{ product.title }}</td>
                                    <td class="p-4">{{ product.category }}</td>
                                    <td class="p-4">¥{{ product.priceFiat }}</td>
                                    <td class="p-4">{{ product.seller?.nickname || product.seller?.email || '未知' }}</td>
                                    <td class="p-4">{{ product.isAvailable ? '是' : '否' }}</td>
                                    <td class="p-4 flex justify-center gap-2">
                                        <button @click="takedownProduct(product)" class="bg-yellow-600 text-white text-xs px-3 py-1.5 rounded">下架</button>
                                        <button @click="deleteProduct(product)" class="bg-red-600 text-white text-xs px-3 py-1.5 rounded">删除</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section>
                    <h2 class="text-xl font-bold text-white border-l-4 border-yellow-500 pl-3 mb-5">订单仲裁</h2>
                    <div class="overflow-x-auto bg-gray-800 rounded-xl border border-gray-700">
                        <table class="w-full text-left">
                            <thead><tr class="bg-gray-900 text-gray-400 text-sm"><th class="p-4">ID</th><th class="p-4">商品</th><th class="p-4">买家</th><th class="p-4">卖家</th><th class="p-4">状态</th><th class="p-4 text-center">操作</th></tr></thead>
                            <tbody class="divide-y divide-gray-700">
                                <tr v-for="order in orders" :key="order.id" class="hover:bg-gray-700">
                                    <td class="p-4 font-mono text-yellow-500">#{{ order.id }}</td>
                                    <td class="p-4">{{ order.product?.title || '未知商品' }}</td>
                                    <td class="p-4">{{ order.buyer?.nickname || order.buyer?.email || '未知' }}</td>
                                    <td class="p-4">{{ order.seller?.nickname || order.seller?.email || '未知' }}</td>
                                    <td class="p-4">{{ order.status }}</td>
                                    <td class="p-4 flex justify-center gap-2">
                                        <template v-if="order.status === 'DISPUTED'">
                                            <button @click="arbitrate(order.id, 'RELEASE')" class="bg-green-600 text-white text-xs px-3 py-1.5 rounded">放款给卖家</button>
                                            <button @click="arbitrate(order.id, 'REFUND')" class="bg-red-600 text-white text-xs px-3 py-1.5 rounded">退款给买家</button>
                                        </template>
                                        <span v-else class="text-gray-500 text-xs italic">无需处理</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section>
                    <h2 class="text-xl font-bold text-white border-l-4 border-yellow-500 pl-3 mb-5">举报处理</h2>
                    <div class="overflow-x-auto bg-gray-800 rounded-xl border border-gray-700">
                        <table class="w-full text-left">
                            <thead><tr class="bg-gray-900 text-gray-400 text-sm"><th class="p-4">ID</th><th class="p-4">商品</th><th class="p-4">原因</th><th class="p-4">举报人</th><th class="p-4">状态</th><th class="p-4 text-center">操作</th></tr></thead>
                            <tbody class="divide-y divide-gray-700">
                                <tr v-for="report in reports" :key="report.id" class="hover:bg-gray-700">
                                    <td class="p-4 font-mono text-yellow-500">#{{ report.id }}</td>
                                    <td class="p-4">{{ report.product?.title || '未知商品' }}</td>
                                    <td class="p-4 max-w-md">{{ report.reason }}</td>
                                    <td class="p-4">{{ report.reporter?.nickname || report.reporter?.email || '未知' }}</td>
                                    <td class="p-4">{{ report.status === 'PENDING' ? '待处理' : '已处理' }}</td>
                                    <td class="p-4 text-center">
                                        <button v-if="report.status === 'PENDING'" @click="resolveReport(report)" class="bg-green-600 text-white text-xs px-3 py-1.5 rounded">标记已处理</button>
                                        <span v-else class="text-gray-500 text-xs italic">已处理</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section>
                    <h2 class="text-xl font-bold text-white border-l-4 border-yellow-500 pl-3 mb-5">评价管理</h2>
                    <div class="overflow-x-auto bg-gray-800 rounded-xl border border-gray-700">
                        <table class="w-full text-left">
                            <thead><tr class="bg-gray-900 text-gray-400 text-sm"><th class="p-4">ID</th><th class="p-4">评分</th><th class="p-4">内容</th><th class="p-4">评价人</th><th class="p-4">被评价人</th><th class="p-4">隐藏</th><th class="p-4 text-center">操作</th></tr></thead>
                            <tbody class="divide-y divide-gray-700">
                                <tr v-for="review in reviews" :key="review.id" class="hover:bg-gray-700">
                                    <td class="p-4 font-mono text-yellow-500">#{{ review.id }}</td>
                                    <td class="p-4 text-yellow-400">{{ stars(review.rating) }}</td>
                                    <td class="p-4 max-w-md">{{ review.content }}</td>
                                    <td class="p-4">{{ review.reviewer?.nickname || review.reviewer?.email || '未知' }}</td>
                                    <td class="p-4">{{ review.reviewee?.nickname || review.reviewee?.email || '未知' }}</td>
                                    <td class="p-4">{{ review.isHidden ? '是' : '否' }}</td>
                                    <td class="p-4 flex justify-center gap-2">
                                        <button @click="toggleReviewHidden(review)" class="bg-yellow-600 text-white text-xs px-3 py-1.5 rounded">{{ review.isHidden ? '恢复显示' : '隐藏' }}</button>
                                        <button @click="deleteReview(review)" class="bg-red-600 text-white text-xs px-3 py-1.5 rounded">删除</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </template>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_BASE = window.location.origin;

        createApp({
            setup() {
                const token = localStorage.getItem('jwt_token') || localStorage.getItem('token');
                const stats = ref({});
                const users = ref([]);
                const products = ref([]);
                const orders = ref([]);
                const reports = ref([]);
                const reviews = ref([]);
                const web3Config = ref({ web3Mode: false });
                const authError = ref('');

                const headers = () => ({
                    'Content-Type': 'application/json',
                    ...(token ? { Authorization: `Bearer ${token}` } : {})
                });

                onMounted(async () => {
                    const ok = await ensureAdmin();
                    Web3Trade.config().then(cfg => { web3Config.value = cfg; }).catch(() => {});
                    if (ok) loadAll();
                });

                const ensureAdmin = async () => {
                    if (!token) {
                        authError.value = '请先登录管理员账号。';
                        return false;
                    }

                    let role = localStorage.getItem('role');
                    try {
                        role = JSON.parse(localStorage.getItem('user') || '{}').role || role;
                    } catch (e) {}

                    if (role === 'ADMIN') return true;

                    try {
                        const res = await fetch(`${API_BASE}/api/auth/me`, { headers: headers() });
                        const user = await res.json();
                        if (res.ok) {
                            localStorage.setItem('user', JSON.stringify(user));
                            localStorage.setItem('role', user.role);
                            if (user.role === 'ADMIN') return true;
                        }
                    } catch (e) {}

                    authError.value = '没有权限，需要管理员账号。请确认使用 admin@test.com 登录，并且已运行 seed 数据。';
                    return false;
                };

                const api = async (url, options = {}) => {
                    const res = await fetch(`${API_BASE}${url}`, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) throw new Error(data.error || '请求失败');
                    return data;
                };

                const loadAll = async () => {
                    try {
                        const [s, u, p, o, rp, rv] = await Promise.all([
                            api('/api/admin/stats'),
                            api('/api/admin/users'),
                            api('/api/admin/products'),
                            api('/api/admin/orders'),
                            api('/api/admin/reports'),
                            api('/api/admin/reviews')
                        ]);
                        stats.value = s;
                        users.value = u.users || u;
                        products.value = p.products || p;
                        orders.value = o.orders || o;
                        reports.value = rp.reports || rp;
                        reviews.value = rv.reviews || rv;
                    } catch (e) {
                        authError.value = e.message;
                    }
                };

                const banUser = async (user) => {
                    if (!confirm(`确认封禁 ${user.email}？`)) return;
                    await api(`/api/admin/users/${user.id}/ban`, { method: 'PATCH' });
                    loadAll();
                };
                const unbanUser = async (user) => {
                    await api(`/api/admin/users/${user.id}/unban`, { method: 'PATCH' });
                    loadAll();
                };
                const resetPassword = async (user) => {
                    if (!confirm(`确认将 ${user.email} 的密码重置为 123456？`)) return;
                    await api(`/api/admin/users/${user.id}/reset-password`, { method: 'PATCH' });
                    alert('密码已重置为 123456');
                };
                const takedownProduct = async (product) => {
                    await api(`/api/admin/products/${product.id}/takedown`, { method: 'PATCH' });
                    loadAll();
                };
                const deleteProduct = async (product) => {
                    if (!confirm(`确认删除商品「${product.title}」？已有订单的商品只能下架。`)) return;
                    await api(`/api/admin/products/${product.id}`, { method: 'DELETE' });
                    loadAll();
                };
                const arbitrate = async (orderId, decision) => {
                    try {
                        const order = orders.value.find(item => item.id === orderId);
                        const txHash = web3Config.value.web3Mode ? await Web3Trade.resolveDispute(order, decision) : undefined;
                        await api(`/api/admin/orders/${orderId}/arbitrate`, { method: 'POST', body: JSON.stringify({ decision, txHash }) });
                        loadAll();
                    } catch (e) {
                        alert(e.message || '仲裁失败');
                    }
                };
                const resolveReport = async (report) => {
                    await api(`/api/admin/reports/${report.id}/resolve`, { method: 'PATCH' });
                    loadAll();
                };
                const toggleReviewHidden = async (review) => {
                    await api(`/api/admin/reviews/${review.id}/hide`, { method: 'PATCH', body: JSON.stringify({ isHidden: !review.isHidden }) });
                    loadAll();
                };
                const deleteReview = async (review) => {
                    if (!confirm(`确认删除评价 #${review.id}？`)) return;
                    await api(`/api/admin/reviews/${review.id}`, { method: 'DELETE' });
                    loadAll();
                };
                const stars = (rating) => '★'.repeat(rating) + '☆'.repeat(5 - rating);
                const goToMarket = () => { window.location.href = 'index.html'; };

                return {
                    stats,
                    users,
                    products,
                    orders,
                    reports,
                    reviews,
                    web3Config,
                    authError,
                    banUser,
                    unbanUser,
                    resetPassword,
                    takedownProduct,
                    deleteProduct,
                    arbitrate,
                    resolveReport,
                    toggleReviewHidden,
                    deleteReview,
                    stars,
                    goToMarket
                };
            }
        }).mount('#app');
    </script>
    <script src="/nav.js"></script>
</body>
</html>
