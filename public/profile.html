<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 校园二手交易平台</title>
    <script src="/vendor/vue.global.prod.js"></script>
    <script src="/vendor/ethers.umd.min.js"></script>
    <script src="/web3.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app">
        <nav class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold">个人信息</h1>
            <div class="space-x-4">
                <a href="index.html" class="hover:text-indigo-200">商品大厅</a>
                <a href="dashboard.html" class="hover:text-indigo-200">我的订单</a>
                <a href="my-products.html" class="hover:text-indigo-200">我的发布</a>
            </div>
        </nav>

        <main class="container mx-auto p-6 max-w-2xl">
            <section class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-2xl font-black text-gray-900 mb-5">我的资料</h2>

                <div v-if="loading" class="text-gray-500">正在加载...</div>
                <template v-else>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">邮箱</label>
                            <input :value="user.email" disabled class="w-full p-3 bg-gray-100 border rounded text-gray-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">昵称</label>
                            <input v-model="nickname" class="w-full p-3 bg-gray-50 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-indigo-50 rounded p-4">
                                <div class="text-sm text-indigo-700 font-bold">角色</div>
                                <div class="text-xl font-black">{{ user.role }}</div>
                            </div>
                            <div class="bg-green-50 rounded p-4">
                                <div class="text-sm text-green-700 font-bold">信用分</div>
                                <div class="text-xl font-black">{{ user.creditRating }}</div>
                            </div>
                        </div>
                        <div class="border rounded p-4">
                            <div class="text-sm text-gray-700 font-bold mb-1">Web3 钱包地址</div>
                            <div class="font-mono text-sm break-all text-gray-700">{{ user.walletAddress || '未绑定' }}</div>
                            <button @click="bindWallet" class="mt-3 bg-gray-900 text-white font-bold px-4 py-2 rounded hover:bg-gray-800">连接并绑定钱包</button>
                        </div>
                    </div>

                    <p v-if="message" class="mt-4 text-green-600 font-bold">{{ message }}</p>
                    <p v-if="error" class="mt-4 text-red-600 font-bold">{{ error }}</p>

                    <div class="mt-6 flex justify-end gap-3">
                        <a href="index.html" class="bg-gray-200 text-gray-700 font-bold px-5 py-3 rounded hover:bg-gray-300">返回</a>
                        <button @click="save" class="bg-indigo-600 text-white font-bold px-5 py-3 rounded hover:bg-indigo-700">保存资料</button>
                    </div>
                </template>
            </section>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_BASE = window.location.origin;

        createApp({
            setup() {
                const token = localStorage.getItem('jwt_token');
                const user = ref({});
                const nickname = ref('');
                const loading = ref(true);
                const error = ref('');
                const message = ref('');

                const authHeaders = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                };

                onMounted(async () => {
                    if (!token) {
                        window.location.href = 'login.html';
                        return;
                    }
                    await loadMe();
                });

                const loadMe = async () => {
                    loading.value = true;
                    error.value = '';
                    try {
                        const response = await fetch(`${API_BASE}/api/auth/me`, { headers: authHeaders });
                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error || '加载个人信息失败');
                        user.value = data;
                        nickname.value = data.nickname || '';
                    } catch (err) {
                        error.value = err.message;
                    } finally {
                        loading.value = false;
                    }
                };

                const save = async () => {
                    error.value = '';
                    message.value = '';
                    try {
                        const response = await fetch(`${API_BASE}/api/auth/me`, {
                            method: 'PUT',
                            headers: authHeaders,
                            body: JSON.stringify({ nickname: nickname.value })
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error || '保存失败');
                        user.value = data.user;
                        message.value = data.message || '保存成功';
                    } catch (err) {
                        error.value = err.message;
                    }
                };

                const bindWallet = async () => {
                    error.value = '';
                    message.value = '';
                    try {
                        const data = await Web3Trade.bindWallet(token);
                        user.value = data.user;
                        localStorage.setItem('user', JSON.stringify(data.user));
                        message.value = data.message || '钱包地址已绑定';
                    } catch (err) {
                        error.value = err.message;
                    }
                };

                return { user, nickname, loading, error, message, save, bindWallet };
            }
        }).mount('#app');
    </script>
    <script src="/nav.js"></script>
</body>
</html>
